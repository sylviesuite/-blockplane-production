# Render infrastructure-as-code — cron job only.
# The main web service (blockplane-production) is managed separately in the
# Render dashboard and is NOT listed here to avoid accidental IAC sync.
#
# To create this cron job:
#   1. Render Dashboard → New → Cron Job
#   2. Connect the GitHub repo
#   3. Render will detect this file and pre-fill the settings
#   4. Set AGENT_SECRET in Environment → Secret Files (do NOT use sync: false default)
#
# Schedule is UTC. 13:00 UTC = 9 AM EDT / 8 AM EST.
# Firing at 13:00 UTC targets mid-morning when the Render web service
# is likely already warm from real traffic, reducing stalled-at-0 runs.

services:
  - type: cron
    name: blockplane-agent-daily
    env: node
    plan: starter
    schedule: "0 13 * * *"   # 09:00 EDT / 08:00 EST
    buildCommand: npm install
    startCommand: node scripts/trigger-agent.mjs
    envVars:
      - key: AGENT_SECRET
        sync: false           # Set this manually in the Render dashboard
