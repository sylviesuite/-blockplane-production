[build]
  command   = "npm run build"
  publish   = "client/dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy API calls to Render backend — must come before the SPA catch-all
[[redirects]]
  from   = "/api/*"
  to     = "https://blockplane-production.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — all routes serve index.html, client-side router takes over
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
