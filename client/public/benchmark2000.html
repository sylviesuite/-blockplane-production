<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benchmark 2000 — Blockplane Metric</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#1a2e1f;color:#f5f2ec;font-family:system-ui,-apple-system,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}

.header{display:flex;align-items:center;gap:2.5rem;padding:0.7rem 2.5rem;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.header h1{font-size:1.4rem;font-weight:700;color:#c17f24;letter-spacing:-0.02em;white-space:nowrap}
.header-progress{flex:1;display:flex;flex-direction:column;gap:0.3rem}
.header-progress-top{display:flex;justify-content:space-between;align-items:baseline}
.header-bar-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.07em;color:rgba(245,242,236,0.4)}
.tracker-level{font-size:0.75rem;font-weight:700;color:#c17f24;transition:color 0.4s}
.btn-reset{padding:3px 10px;border-radius:6px;font-size:0.68rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;cursor:pointer;background:transparent;color:#c17f24;border:1px solid rgba(193,127,36,0.5);white-space:nowrap;transition:border-color 0.15s,color 0.15s}
.btn-reset:hover{border-color:#c17f24;color:#e8a83e}

.scoreboard{display:flex;gap:0.85rem;padding:0.7rem 2.5rem;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.score-card{flex:1;background:rgba(255,255,255,0.06);border-radius:10px;padding:0.9rem 1.1rem;border:1px solid rgba(255,255,255,0.09);transition:border-color 0.3s}
.score-card .label{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.07em;color:rgba(245,242,236,0.45);margin-bottom:0.35rem}
.score-card .value{font-size:1.35rem;font-weight:700;color:#f5f2ec;transition:color 0.4s}
.score-card .sub{font-size:0.73rem;color:rgba(245,242,236,0.45);margin-top:0.1rem}
.score-card.accent .value{color:#c17f24}
.score-card.positive{border-color:rgba(74,222,128,0.3)}
.score-card.positive .value{color:#4ade80}

.main{flex:1;min-height:0;display:flex;padding:0.75rem 2.5rem 1rem;gap:0;overflow:hidden}

.house-area{flex:0 0 60%;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:0.4rem}
.house-container{position:relative;display:block;width:100%;flex:1;min-height:0}
.swap-feedback{margin-top:0.65rem;padding:0.55rem 0.8rem;border-radius:7px;font-size:0.74rem;line-height:1.45}
.swap-feedback.green{background:rgba(74,222,128,0.07);border:1px solid rgba(74,222,128,0.2);color:#86efac}
.swap-feedback.amber{background:rgba(193,127,36,0.08);border:1px solid rgba(193,127,36,0.25);color:#fbbf24}
.house-image{width:100%;height:100%;display:block;border-radius:10px;object-fit:contain}
.zone-svg{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:10px;overflow:hidden}

.zone-group polygon,.zone-group path{transition:fill-opacity 0.18s,stroke-opacity 0.18s;cursor:pointer}
.zone-group:hover polygon,.zone-group:hover path,
.zone-group.active polygon,.zone-group.active path{fill-opacity:0.28!important;stroke-opacity:0.9!important}

.zone-pill{position:absolute;padding:3px 9px;border-radius:20px;font-size:0.67rem;font-weight:600;cursor:pointer;border:none;outline:none;transition:transform 0.12s,box-shadow 0.12s;white-space:nowrap;z-index:10;letter-spacing:0.04em;text-transform:uppercase}
.zone-pill:hover{transform:scale(1.06)}
.zone-pill.active{box-shadow:0 0 0 2px rgba(255,255,255,0.8)}
.zone-pill.red{background:rgba(220,38,38,0.9);color:#fff}
.zone-pill.amber{background:rgba(193,127,36,0.95);color:#fff}
.zone-pill.green{background:rgba(22,163,74,0.9);color:#fff}

.panel{flex:0 0 40%;padding:0 0 0 1.75rem;display:flex;flex-direction:column}
.panel-empty{display:flex;flex-direction:column;justify-content:center;height:100%}
.coach-panel-msg{padding:0.75rem 1rem;background:rgba(193,127,36,0.07);border-left:3px solid rgba(193,127,36,0.6);border-radius:0 6px 6px 0;font-size:0.8rem;color:rgba(193,127,36,0.88);line-height:1.6}
.btn-start-foundation{margin-top:0.85rem;padding:0.6rem 1rem;background:#c17f24;color:#1a2e1f;border:none;border-radius:7px;font-size:0.8rem;font-weight:700;cursor:pointer;width:100%;text-align:center;letter-spacing:0.02em;transition:background 0.15s}
.btn-start-foundation:hover{background:#d4922d}

#panel-content{display:none;flex-direction:column;gap:0}
.zone-title-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.75rem}
.zone-title{font-size:1.2rem;font-weight:700;color:#f5f2ec}
.zone-meta{display:flex;gap:1rem;margin-top:0.25rem}
.zone-meta span{font-size:0.78rem;color:rgba(245,242,236,0.5)}
.zone-meta strong{color:#f5f2ec;font-weight:600}
.ris-chip{padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:700;flex-shrink:0;margin-top:2px}
.ris-chip.red{background:rgba(220,38,38,0.18);color:#f87171;border:1px solid rgba(220,38,38,0.35)}
.ris-chip.amber{background:rgba(193,127,36,0.18);color:#fbbf24;border:1px solid rgba(193,127,36,0.35)}
.ris-chip.green{background:rgba(22,163,74,0.18);color:#4ade80;border:1px solid rgba(22,163,74,0.35)}

.insight{font-size:0.82rem;line-height:1.65;color:rgba(245,242,236,0.72);background:rgba(255,255,255,0.04);border-radius:8px;padding:0.8rem 0.95rem;border-left:3px solid #c17f24;margin-bottom:1rem}

.swaps-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:rgba(245,242,236,0.4);margin-bottom:0.5rem}
.swap-cards{display:flex;flex-direction:column;gap:0.5rem}
.swap-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:9px;padding:0.8rem 0.9rem;transition:border-color 0.2s,background 0.2s}
.swap-card.applied{background:rgba(74,222,128,0.07);border-color:rgba(74,222,128,0.3)}
.swap-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.3rem}
.swap-name{font-size:0.84rem;font-weight:600;color:#f5f2ec}
.swap-delta{font-size:0.82rem;font-weight:700;color:#4ade80}
.swap-desc{font-size:0.75rem;color:rgba(245,242,236,0.5);margin-bottom:0.55rem;line-height:1.5}
.swap-btn{padding:4px 13px;border-radius:6px;font-size:0.72rem;font-weight:600;cursor:pointer;border:none;letter-spacing:0.02em;transition:background 0.15s,transform 0.1s}
.swap-btn.try{background:#c17f24;color:#1a2e1f}
.swap-btn.try:hover{background:#d4922d;transform:translateY(-1px)}
.swap-btn.undo{background:rgba(74,222,128,0.2);color:#4ade80;border:1px solid rgba(74,222,128,0.4)}

.bar-wrap{position:relative;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;margin-bottom:0.55rem}
.bar-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#c17f24,#e8a83e);border-radius:3px;transition:width 0.65s cubic-bezier(0.4,0,0.2,1);width:0%}
.bar-tick{position:absolute;top:-3px;width:2px;height:12px;background:rgba(255,255,255,0.2);border-radius:1px;transform:translateX(-50%)}
.bar-tick.hit{background:#c17f24}

.milestones{position:relative;height:14px}
.milestone{position:absolute;transform:translateX(-50%);text-align:center;font-size:0.65rem;color:rgba(245,242,236,0.35);line-height:1.4;transition:color 0.3s}
.milestone.hit{color:#c17f24;font-weight:600}
</style>
</head>
<body>

<header class="header">
  <h1>Benchmark 2000</h1>
  <button class="btn-reset" onclick="resetAll()">Reset</button>
  <div class="header-progress">
    <div class="header-progress-top">
      <span class="header-bar-label">Build Better</span>
    </div>
    <div class="bar-wrap" id="bar-wrap">
      <div class="bar-fill" id="bar-fill"></div>
    </div>
    <div class="milestones" id="milestones"></div>
  </div>
</header>

<div class="scoreboard">
  <div class="score-card" id="card-carbon">
    <div class="label">Whole-House Carbon</div>
    <div class="value" id="val-carbon">31,926</div>
    <div class="sub">kg CO₂e</div>
  </div>
  <div class="score-card" id="card-ris">
    <div class="label">RIS Score</div>
    <div class="value" id="val-ris">51</div>
    <div class="sub" id="sub-ris">Bronze</div>
  </div>
  <div class="score-card accent" id="card-level">
    <div class="label">Build Level</div>
    <div class="value" id="val-level">Standard</div>
    <div class="sub">Build</div>
  </div>
  <div class="score-card" id="card-hotspots">
    <div class="label">Hotspots</div>
    <div class="value" id="val-hotspots">3</div>
    <div class="sub">zones below Silver</div>
  </div>
  <div class="score-card" id="card-improvement">
    <div class="label">Improvement</div>
    <div class="value" id="val-improvement">0.0%</div>
    <div class="sub">vs. Standard Build</div>
  </div>
</div>

<div class="main">
  <div class="house-area">
    <div class="house-container" id="house-container">
      <img src="https://blockplanemetric.com/images/benchmark2000-house.png"
           alt="Benchmark 2000 — Northern Michigan Home"
           class="house-image" id="house-img">
      <svg class="zone-svg" id="zone-svg" viewBox="0 0 1000 667" preserveAspectRatio="xMidYMid slice">
        <!-- populated by JS -->
      </svg>
    </div>
  </div>
  <div class="panel" id="panel">
    <div class="panel-empty" id="panel-empty">
      <div class="coach-panel-msg" id="coach-panel-msg">Suggested first move: The foundation carries 51% of this home's embodied carbon. Click it to compare better options →</div>
      <button class="btn-start-foundation" id="btn-start-foundation" onclick="startWithFoundation()">Start with Foundation →</button>
    </div>
    <div id="panel-content"></div>
  </div>
</div>


<script>
// ─── ZONE DATA ────────────────────────────────────────────────────────────────
const ZONES = {
  foundation: {
    name: "Foundation",
    carbon: 16224, ris: 38, color: "red",
    pill: { left: "6%", top: "84%" },
    insight: "Your poured concrete foundation accounts for over half this home's embodied carbon. Portland cement is responsible for roughly 8% of global CO₂ emissions. Specifying a mix with 40–50% fly ash or slag substitution is a low-cost, high-impact change that most Michigan contractors can source locally.",
    swaps: [
      { name: "Fly Ash Concrete (40%)", delta: -3200, rd: 6, desc: "Replace 40% of Portland cement with fly ash — a power-plant byproduct that cuts process emissions significantly." },
      { name: "Slag-Blended Mix (50%)", delta: -4800, rd: 9, desc: "GGBS at 50% substitution; maintains structural strength while dramatically reducing GWP." },
      { name: "Optimized Structural Mix", delta: -1600, rd: 4, desc: "Reduce concrete volume 10–15% via structural optimization without changing the mix design." }
    ]
  },
  sheathing: {
    name: "Floor Assembly",
    carbon: 7266, ris: 52, color: "amber",
    pill: { left: "41%", top: "76%" },
    insight: "OSB sheathing and engineered lumber in the floor assembly are the second-largest carbon contributor. Mass timber panels sequester biogenic carbon while often simplifying installation. Recycled-content OSB is a drop-in replacement with a lower footprint.",
    swaps: [
      { name: "Recycled-Content OSB", delta: -800, rd: 4, desc: "OSB made with higher recycled fiber content and low-VOC binders — same spec, better GWP." },
      { name: "Cross-Laminated Timber", delta: -1800, rd: 8, desc: "CLT panels sequester biogenic carbon and replace multiple OSB layers in one product." }
    ]
  },
  roofing: {
    name: "Roof",
    carbon: 970, ris: 44, color: "red",
    pill: { left: "43%", top: "5%" },
    insight: "Asphalt shingles are petroleum-derived and last only 20–25 years before going to landfill. A steel standing seam roof lasts 50+ years, can contain significant recycled content, and is fully recyclable at end of life — turning a maintenance item into a long-term asset.",
    swaps: [
      { name: "Steel Standing Seam", delta: -180, rd: 8, desc: "50-year lifespan, often 25–35% recycled content, fully recyclable at end of life." },
      { name: "Reclaimed Slate", delta: -260, rd: 11, desc: "Near-zero embodied carbon; reused material skips new manufacturing entirely." }
    ]
  },
  windows: {
    name: "Windows",
    carbon: 2666, ris: 66, color: "green",
    pill: { left: "8%", top: "38%" },
    insight: "Aluminum-framed windows carry high embodied carbon from energy-intensive smelting. Wood or fiberglass frames reduce that impact substantially while improving the thermal break — critical in Michigan's Zone 6 climate where windows are a primary heat-loss path.",
    swaps: [
      { name: "Wood-Frame Triple Pane", delta: -600, rd: 6, desc: "FSC-certified wood frames with triple low-e glazing — lower carbon, better U-value." },
      { name: "Fiberglass Frame Windows", delta: -420, rd: 4, desc: "Pultruded fiberglass composite: low carbon, excellent thermal break, 40+ year lifespan." }
    ]
  },
  attic: {
    name: "Attic Insulation",
    carbon: 2100, ris: 71, color: "green",
    pill: { left: "43%", top: "27%" },
    insight: "Blown fiberglass has a global warming potential roughly 5× higher than cellulose due to manufacturing energy. Dense-pack cellulose is 85% recycled newspaper, performs better in cold attics by reducing convective loops, and sequesters biogenic carbon as a bonus.",
    swaps: [
      { name: "Dense-Pack Cellulose", delta: -700, rd: 5, desc: "85% recycled content, carbon-negative biogenic material, superior cold-climate performance." },
      { name: "Mineral Wool Batt", delta: -350, rd: 3, desc: "Slag-based mineral wool — non-combustible, moisture-resistant, moderate carbon improvement." }
    ]
  },
  framing: {
    name: "Wall Assembly",
    carbon: 1140, ris: 68, color: "amber",
    pill: { left: "5%", top: "58%" },
    insight: "Conventional 2×6 framing is already a low-carbon structural option. Advanced framing (OVE) reduces lumber use by 20–25% while adding more insulation cavity — a win on both embodied and operational carbon. The savings are modest but essentially free at the design stage.",
    swaps: [
      { name: "Advanced Framing (OVE)", delta: -200, rd: 5, desc: "24″ o.c. framing with two-stud corners cuts lumber 20–25% without compromising structure." },
      { name: "FSC-Certified Lumber", delta: -80, rd: 2, desc: "Chain-of-custody certified sustainable forestry — same product, verified responsible sourcing." }
    ]
  }
};

// ─── SVG ZONE SHAPES (viewBox 0 0 1000 667) ──────────────────────────────────
// even-odd fill-rule used for rings and wall-with-window-cutouts
const ZONE_SHAPES = {
  roofing:    { d: "M150,20 H750 V140 H150 Z",   rule: "nonzero" },
  attic:      { d: "M300,167 H750 V300 H300 Z",  rule: "nonzero" },
  framing:    { d: "M50,233 H300 V520 H50 Z",    rule: "nonzero" },
  windows:    { d: "M80,280 H280 V427 H80 Z",    rule: "nonzero" },
  sheathing:  { d: "M250,414 H800 V494 H250 Z",  rule: "nonzero" },
  foundation: { d: "M50,520 H500 V620 H50 Z",    rule: "nonzero" }
};

const COLOR_HEX = { red: "#ef4444", amber: "#f59e0b", green: "#22c55e" };

// ─── SWAP FEEDBACK MESSAGES ───────────────────────────────────────────────────
const SWAP_FEEDBACK = {
  foundation: [
    { tone: "green", msg: "Good swap. Cuts the largest carbon driver while keeping the mix familiar for Michigan contractors." },
    { tone: "green", msg: "Strong swap. GGBS is well-established and widely available — this is one of the highest-impact changes you can make." },
    { tone: "amber", msg: "Practical swap. No material change needed — just a more efficient design conversation with your engineer." },
  ],
  sheathing: [
    { tone: "green", msg: "Easy swap. Same installation, lower footprint. Worth specifying on every project." },
    { tone: "amber", msg: "Ambitious swap. CLT sequesters carbon and simplifies the assembly — best suited for projects where the budget supports it." },
  ],
  roofing: [
    { tone: "amber", msg: "Long-term swap. Higher upfront cost but lasts 50+ years and is fully recyclable — strong lifecycle argument." },
    { tone: "green", msg: "Regenerative swap. Near-zero embodied carbon. Availability varies but worth asking about in Northern Michigan." },
  ],
  windows: [
    { tone: "amber", msg: "Premium swap. Best thermal and carbon performance. Higher cost but strong for high-performance builds." },
    { tone: "green", msg: "Incremental swap. Better thermal performance and modest carbon reduction — solid upgrade." },
  ],
  attic: [
    { tone: "green", msg: "Clean swap. Recycled content, same performance, lower carbon. Easy upgrade." },
    { tone: "green", msg: "Solid alternative. Non-combustible and moisture-resistant — practical for Michigan's climate." },
  ],
  framing: [
    { tone: "green", msg: "Smart swap. Reduces lumber use without changing the build process — easy to specify." },
    { tone: "amber", msg: "Sourcing swap. Same product, verified responsible forestry. Low effort, good story." },
  ],
};

// ─── STATE ────────────────────────────────────────────────────────────────────
const state = {
  selected: null,
  swaps: {},       // { zoneKey: swapIndex }
  foundationReviewed: false,
  BASE_CARBON: 31926,
  BASE_RIS: 51,

  get carbon() {
    return Object.entries(this.swaps).reduce((t, [k, i]) => t + ZONES[k].swaps[i].delta, this.BASE_CARBON);
  },
  get savePct() {
    return (this.BASE_CARBON - this.carbon) / this.BASE_CARBON * 100;
  },
  get ris() {
    return Math.min(Math.round(this.BASE_RIS + this.savePct * 1.2), 94);
  },
  get risRating() {
    const r = this.ris;
    if (r >= 80) return "Platinum";
    if (r >= 70) return "Gold";
    if (r >= 60) return "Silver";
    return "Bronze";
  },
  get hotspots() {
    return Object.keys(ZONES).filter(k => {
      const base = ZONES[k].ris;
      const bonus = (this.swaps[k] !== undefined) ? ZONES[k].swaps[this.swaps[k]].rd : 0;
      return (base + bonus) < 60;
    }).length;
  },
  get buildLevel() {
    const p = this.savePct;
    if (p >= 35) return "Excellent Build";
    if (p >= 25) return "Great Build";
    if (p >= 16) return "Good Build";
    if (p >=  8) return "Better Build";
    return "Standard Build";
  }
};

// ─── ANIMATION ────────────────────────────────────────────────────────────────
function animNum(el, from, to, { dec = 0, suffix = "" } = {}) {
  const t0 = performance.now(), dur = 550;
  const fmt = v => (dec ? v.toFixed(dec) : Math.round(v).toLocaleString()) + suffix;
  function tick(t) {
    const p = Math.min((t - t0) / dur, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = fmt(from + (to - from) * ease);
    if (p < 1) requestAnimationFrame(tick);
    else el.textContent = fmt(to);
  }
  requestAnimationFrame(tick);
}

// ─── SCOREBOARD ───────────────────────────────────────────────────────────────
let _prevCarbon = state.BASE_CARBON, _prevRIS = state.BASE_RIS, _prevPct = 0;

function updateScoreboard() {
  const c = state.carbon, r = state.ris, p = state.savePct;

  animNum(document.getElementById("val-carbon"), _prevCarbon, c);
  animNum(document.getElementById("val-ris"), _prevRIS, r);
  animNum(document.getElementById("val-improvement"), _prevPct, p, { dec: 1, suffix: "%" });

  document.getElementById("sub-ris").textContent = state.risRating;
  document.getElementById("val-level").textContent = state.buildLevel.replace(" Build", "");
  document.getElementById("val-hotspots").textContent = state.hotspots;

  // progress bar (max = 35%)
  const barPct = Math.min(p / 35 * 100, 100);
  document.getElementById("bar-fill").style.width = barPct + "%";


  // milestone ticks & labels
  [0, 8, 16, 25, 35].forEach(m => {
    const el = document.getElementById("tick-" + m);
    const lbl = document.getElementById("lbl-" + m);
    if (el) el.classList.toggle("hit", p >= m);
    if (lbl) lbl.classList.toggle("hit", p >= m);
  });

  // card coloring
  const impCard = document.getElementById("card-improvement");
  impCard.className = p >= 35 ? "score-card positive" : p > 0 ? "score-card accent" : "score-card";

  _prevCarbon = c; _prevRIS = r; _prevPct = p;
}

// ─── BUILD TRACKER MILESTONES ─────────────────────────────────────────────────
function buildTracker() {
  const wrap = document.getElementById("bar-wrap");
  const ms = document.getElementById("milestones");
  const milestones = [
    { pct: 0,  label: "Standard" },
    { pct: 8,  label: "Better"   },
    { pct: 16, label: "Good"     },
    { pct: 25, label: "Great"    },
    { pct: 35, label: "Excellent" }
  ];
  milestones.forEach(({ pct, label }) => {
    const pos = pct / 35 * 100;

    const tick = document.createElement("div");
    tick.className = "bar-tick";
    tick.id = "tick-" + pct;
    tick.style.left = pos + "%";
    wrap.appendChild(tick);

    const lbl = document.createElement("div");
    lbl.className = "milestone";
    lbl.id = "lbl-" + pct;
    lbl.style.left = pos + "%";
    lbl.textContent = label;
    ms.appendChild(lbl);
  });
}

// ─── SVG ZONES ────────────────────────────────────────────────────────────────
function buildSVG() {
  const svg = document.getElementById("zone-svg");
  const order = ["sheathing", "foundation", "framing", "windows", "attic", "roofing"];

  order.forEach(key => {
    const zone = ZONES[key];
    const shape = ZONE_SHAPES[key];
    const hex = COLOR_HEX[zone.color];

    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.id = "zpoly-" + key;
    g.classList.add("zone-group");

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", shape.d);
    path.setAttribute("fill-rule", shape.rule);
    path.setAttribute("fill", hex);
    path.setAttribute("fill-opacity", "0");
    path.setAttribute("stroke", hex);
    path.setAttribute("stroke-width", "1.5");
    path.setAttribute("stroke-opacity", "0");

    g.appendChild(path);
    g.addEventListener("click", () => selectZone(key));
    svg.appendChild(g);
  });
}

// ─── PILLS ────────────────────────────────────────────────────────────────────
function buildPills() {
  const container = document.getElementById("house-container");
  Object.entries(ZONES).forEach(([key, zone]) => {
    const btn = document.createElement("button");
    btn.className = "zone-pill " + zone.color;
    btn.id = "pill-" + key;
    btn.textContent = zone.name;
    btn.style.left = zone.pill.left;
    btn.style.top = zone.pill.top;
    btn.addEventListener("click", () => selectZone(key));
    container.appendChild(btn);
  });
}

// ─── ZONE SELECTION ───────────────────────────────────────────────────────────
function selectZone(key) {
  if (state.selected && state.selected !== key) {
    document.getElementById("zpoly-" + state.selected)?.classList.remove("active");
    document.getElementById("pill-" + state.selected)?.classList.remove("active");
  }
  state.selected = key;
  document.getElementById("zpoly-" + key)?.classList.add("active");
  document.getElementById("pill-" + key)?.classList.add("active");

  // Coach strip logic
  const strip = document.getElementById("coach-strip");
  if (strip) {
    if (key === "foundation") {
      state.foundationReviewed = true;
      strip.style.display = "none";
    } else if (!state.foundationReviewed) {
      strip.textContent = "Foundation is still the largest hotspot when you're ready.";
    }
  }

  renderPanel(key);
}

// ─── PANEL ────────────────────────────────────────────────────────────────────
function renderPanel(key) {
  const zone = ZONES[key];
  const appliedIdx = state.swaps[key];
  const applied = appliedIdx !== undefined ? zone.swaps[appliedIdx] : null;
  const curCarbon = zone.carbon + (applied ? applied.delta : 0);
  const curRIS = zone.ris + (applied ? applied.rd : 0);
  const sharePct = Math.round(curCarbon / state.BASE_CARBON * 100);
  const feedback = appliedIdx !== undefined ? (SWAP_FEEDBACK[key]?.[appliedIdx] ?? null) : null;

  document.getElementById("panel-empty").style.display = "none";
  const content = document.getElementById("panel-content");
  content.style.display = "flex";

  content.innerHTML = `
    <div class="zone-title-row">
      <div>
        <div class="zone-title">${zone.name}</div>
        <div class="zone-meta">
          <span><strong>${curCarbon.toLocaleString()} kg</strong> CO₂e</span>
          <span><strong>${sharePct}%</strong> of total</span>
        </div>
      </div>
      <div class="ris-chip ${effectiveColor(key)}">RIS ${curRIS}</div>
    </div>
    <div class="insight">${zone.insight}</div>
    <div class="swaps-label">Material Swaps</div>
    <div class="swap-cards">
      ${zone.swaps.map((sw, i) => {
        const isOn = state.swaps[key] === i;
        return `<div class="swap-card ${isOn ? "applied" : ""}" id="sc-${key}-${i}">
          <div class="swap-top">
            <span class="swap-name">${sw.name}</span>
            <span class="swap-delta">${sw.delta > 0 ? "+" : ""}${sw.delta.toLocaleString()} kg</span>
          </div>
          <div class="swap-desc">${sw.desc}</div>
          <button class="swap-btn ${isOn ? "undo" : "try"}" onclick="toggleSwap('${key}',${i})">
            ${isOn ? "✓ Applied — Undo" : "Try Swap"}
          </button>
        </div>`;
      }).join("")}
    </div>
    ${feedback ? `<div class="swap-feedback ${feedback.tone}">${feedback.msg}</div>` : ''}
  `;
}

// ─── ZONE COLOR ───────────────────────────────────────────────────────────────
function effectiveColor(key) {
  const zone = ZONES[key];
  const appliedIdx = state.swaps[key];
  if (appliedIdx === undefined) return zone.color;
  const reductionPct = (-zone.swaps[appliedIdx].delta / zone.carbon) * 100;
  if (reductionPct < 15) return zone.color;
  return { red: "amber", amber: "green", green: "green" }[zone.color] ?? zone.color;
}

function updateZoneColor(key) {
  const color = effectiveColor(key);
  const hex = COLOR_HEX[color];
  const pill = document.getElementById("pill-" + key);
  if (pill) { pill.classList.remove("red", "amber", "green"); pill.classList.add(color); }
  const path = document.querySelector("#zpoly-" + key + " path");
  if (path) { path.setAttribute("fill", hex); path.setAttribute("stroke", hex); }
}

// ─── SWAP TOGGLE ──────────────────────────────────────────────────────────────
function toggleSwap(key, idx) {
  if (state.swaps[key] === idx) delete state.swaps[key];
  else state.swaps[key] = idx;
  updateZoneColor(key);
  updateCoachMessage();
  updateScoreboard();
  renderPanel(key);
}

// ─── COACH MESSAGE ────────────────────────────────────────────────────────────
function updateCoachMessage() {
  const has = k => state.swaps[k] !== undefined;
  const msgEl = document.getElementById("coach-panel-msg");
  const btnEl = document.getElementById("btn-start-foundation");
  if (!msgEl) return;

  let text, showBtn;
  if (has("foundation") && has("sheathing") && has("roofing") &&
      (has("framing") || has("attic") || has("windows"))) {
    text = "Strong build. You've reduced whole-house carbon significantly. Export your scenario or reset to try a different approach.";
    showBtn = false;
  } else if (has("foundation") && has("sheathing") && has("roofing")) {
    text = "Three hotspots addressed. Wall assembly and windows are solid choices — consider cellulose insulation or triple-pane glazing for further improvement →";
    showBtn = false;
  } else if (has("foundation") && has("sheathing")) {
    text = "Good progress. The roof is the next hotspot to review. Asphalt shingles are the easiest material to upgrade. Click Roof to compare options →";
    showBtn = false;
  } else if (has("foundation")) {
    text = "Foundation improved. The floor assembly is now the next largest hotspot at 23% of total carbon. Click it to compare better options →";
    showBtn = false;
  } else {
    text = "Suggested first move: The foundation carries 51% of this home's embodied carbon. Click it to compare better options →";
    showBtn = true;
  }

  msgEl.textContent = text;
  if (btnEl) btnEl.style.display = showBtn ? "" : "none";
}

// ─── START WITH FOUNDATION ────────────────────────────────────────────────────
function startWithFoundation() {
  // Brief glow pulse before the active state settles
  const path = document.querySelector("#zpoly-foundation path");
  if (path) {
    path.style.cssText = "fill-opacity:0.55!important;stroke-opacity:1!important";
    setTimeout(() => { path.style.cssText = ""; }, 650);
  }
  selectZone("foundation");
}

// ─── RESET ────────────────────────────────────────────────────────────────────
function resetAll() {
  state.swaps = {};
  state.selected = null;

  // Restore every zone to its original color
  Object.keys(ZONES).forEach(key => {
    updateZoneColor(key);
    document.getElementById("zpoly-" + key)?.classList.remove("active");
    document.getElementById("pill-" + key)?.classList.remove("active");
  });

  // Clear the detail panel
  document.getElementById("panel-empty").style.display = "";
  const content = document.getElementById("panel-content");
  content.style.display = "none";
  content.innerHTML = "";

  updateCoachMessage();
  updateScoreboard();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildTracker();
buildSVG();
buildPills();
updateCoachMessage();
updateScoreboard();
</script>
</body>
</html>
